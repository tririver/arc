[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-domain-info"
version = "0.1.0"
description = "Build cached research-field domain artifacts from a seed paper."
requires-python = ">=3.11"
dependencies = [
  "arc-llm-worker",
  "arc-paper-query",
  "jsonschema>=4.22"
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
arc-domain-info = "arc_domain_info.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_domain_info"]
