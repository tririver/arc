[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-llm"
version = "0.1.0"
description = "Reusable host LLM execution helpers for ARC tools."
requires-python = ">=3.11"

[project.optional-dependencies]
test = ["pytest>=8.0", "sympy>=1.12"]

[project.scripts]
arc-llm = "arc_llm.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_llm"]
