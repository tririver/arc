[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-llm"
version = "0.1.0"
description = "Reusable host LLM execution helpers for ARC tools."
readme = "../../README.md"
license = "MIT"
authors = [{ name = "ARC" }]
requires-python = ">=3.11"
dependencies = ["json-repair>=0.59,<1", "jsonschema>=4.0"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

[project.urls]
Homepage = "https://github.com/tririver/arc"
Repository = "https://github.com/tririver/arc"
Issues = "https://github.com/tririver/arc/issues"

[project.optional-dependencies]
test = ["pytest>=8.0", "sympy>=1.12"]

[project.scripts]
arc-llm = "arc_llm.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_llm"]
