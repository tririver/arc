[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-typeset"
version = "0.9.2"
description = "Typesetting utilities for ARC research artifacts."
readme = "../../README.md"
license = "MIT"
authors = [{ name = "ARC" }]
requires-python = ">=3.11"
dependencies = [
  "arc-llm>=0.9,<0.10"
]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

[project.urls]
Homepage = "https://github.com/tririver/arc"
Repository = "https://github.com/tririver/arc"
Issues = "https://github.com/tririver/arc/issues"

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
arc-typeset = "arc_typeset.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_typeset"]
