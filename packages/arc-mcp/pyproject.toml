[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-mcp"
version = "0.1.0"
description = "MCP tools for ARC research workflows."
readme = "../../README.md"
license = "MIT"
authors = [{ name = "ARC" }]
requires-python = ">=3.11"
dependencies = [
  "arc-domain>=0.1,<0.2",
  "arc-llm>=0.1,<0.2",
  "arc-paper>=0.1,<0.2",
  "arc-typeset>=0.1,<0.2",
  "mcp>=1.0",
  "pydantic>=2"
]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

[project.urls]
Homepage = "https://github.com/tririver/arc"
Repository = "https://github.com/tririver/arc"
Issues = "https://github.com/tririver/arc/issues"

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
arc-mcp = "arc_mcp.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_mcp"]
