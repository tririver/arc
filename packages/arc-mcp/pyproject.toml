[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-mcp"
version = "0.1.0"
description = "MCP tools for ARC paper query workflows."
requires-python = ">=3.11"
dependencies = [
  "arc-paper-query",
  "mcp>=1.0",
  "pydantic>=2"
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
arc-mcp = "arc_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_mcp"]
