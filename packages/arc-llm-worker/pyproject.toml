[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-llm-worker"
version = "0.1.0"
description = "Reusable host LLM execution helpers for ARC tools."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
arc-llm-worker = "arc_llm_worker.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_llm_worker"]
