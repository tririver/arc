[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "arc-paper-query"
version = "0.1.0"
description = "Cache-first ar5iv and INSPIRE paper query tools for ARC."
requires-python = ">=3.11"
dependencies = [
  "arc-llm-worker",
  "beautifulsoup4>=4.12",
  "httpx>=0.27",
  "jsonschema>=4.22",
  "lxml>=5.0"
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
arc-paper-query = "arc_paper_query.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arc_paper_query"]
